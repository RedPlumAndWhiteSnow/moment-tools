<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线 - 片刻 Moment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #5b8baf 0%, #7ab3d6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        
        .offline-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 100%;
        }
        
        .offline-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #2d3748;
            font-size: 24px;
            margin-bottom: 12px;
        }
        
        p {
            color: #718096;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f0f4f8;
            border-radius: 20px;
            font-size: 13px;
            color: #4a5568;
            margin-bottom: 24px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #fc8181;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        button {
            background: linear-gradient(135deg, #5b8baf 0%, #7ab3d6 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 52px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(91, 139, 175, 0.4);
        }
        
        button:active {
            transform: scale(0.96);
        }
        
        .tips {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }
        
        .tips-title {
            font-size: 12px;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        
        .tips-list {
            list-style: none;
            text-align: left;
        }
        
        .tips-list li {
            padding: 8px 0;
            color: #718096;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tips-list li::before {
            content: '💡';
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">📡</div>
        <h1>似乎已断开连接</h1>
        <p>别担心，您可以继续使用已缓存的工具，或者检查网络连接后重试。</p>
        
        <div class="status">
            <span class="status-dot"></span>
            <span>等待网络连接...</span>
        </div>
        
        <button onclick="window.location.reload()">🔄 重试连接</button>
        
        <div class="tips">
            <div class="tips-title">离线提示</div>
            <ul class="tips-list">
                <li>已访问的页面可以离线使用</li>
                <li>数据会自动保存在本地</li>
                <li>恢复连接后自动同步</li>
            </ul>
        </div>
    </div>
    
    <script>
        // 监听网络状态变化
        function updateOnlineStatus() {
            if (navigator.onLine) {
                document.querySelector('.status').innerHTML = `
                    <span class="status-dot" style="background: #48bb78;"></span>
                    <span>网络已连接！正在刷新...</span>
                `
                setTimeout(() => window.location.reload(), 1000)
            }
        }
        
        window.addEventListener('online', updateOnlineStatus)
        window.addEventListener('offline', updateOnlineStatus)
        
        // 初始检查
        updateOnlineStatus()
        
        console.log('[Offline] Offline page loaded')
    </script>
</body>
</html>
